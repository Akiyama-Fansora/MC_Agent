name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install -r requirements.txt

      - name: Python syntax check
        shell: pwsh
        run: >
          python -m py_compile
          api.py
          mcagent\agent_execution.py
          mcagent\agent_executor.py
          mcagent\agent_router.py
          mcagent\artifact_save_service.py
          mcagent\crawler_delegation_service.py
          mcagent\crawler_job_finalization_service.py
          mcagent\crawler_job_progress_service.py
          mcagent\crawler_job_setup_service.py
          mcagent\crawler_loop_control_service.py
          mcagent\crawler_planner_wait_service.py
          mcagent\crawler_reflection_decision_service.py
          mcagent\crawler_runtime_step_service.py
          mcagent\crawler_task_materialization_service.py
          mcagent\crawler_task_preparation_service.py
          mcagent\crawler_temporary_extract_service.py
          mcagent\crawler_result_accounting_service.py
          mcagent\crawler_topic_discovery_service.py
          mcagent\evidence_service.py
          mcagent\event_stream.py
          mcagent\fastapi_app.py
          mcagent\crawler_reflection_service.py
          mcagent\job_view_service.py
          mcagent\rag_service.py
          mcagent\session_state.py
          mcagent\web_server.py
          mcagent\agent_runtime.py
          mcagent\crawler_llm_planner.py
          mcagent\provider_registry.py
          mcagent\crawler_planner.py
          scripts\browser_collect_seed.py
          scripts\fetch_mcmod_seed.py
          scripts\fetch_modpack_archive_seed.py
          scripts\public_readiness_check.py
          scripts\save_artifact.py
          scripts\smoke_agent_flows.py
          tests\artifact_save_service_scenarios.py
          tests\crawler_delegation_service_scenarios.py
          tests\crawler_job_finalization_service_scenarios.py
          tests\crawler_job_progress_service_scenarios.py
          tests\crawler_job_setup_service_scenarios.py
          tests\crawler_loop_control_service_scenarios.py
          tests\crawler_planner_wait_service_scenarios.py
          tests\crawler_reflection_decision_scenarios.py
          tests\crawler_runtime_step_service_scenarios.py
          tests\crawler_task_materialization_service_scenarios.py
          tests\crawler_task_preparation_service_scenarios.py
          tests\crawler_temporary_extract_service_scenarios.py
          tests\crawler_result_accounting_service_scenarios.py
          tests\crawler_topic_discovery_service_scenarios.py
          tests\crawler_reflection_service_scenarios.py
          tests\agent_execution_scenarios.py
          tests\agent_executor_scenarios.py
          tests\agent_five_direction_matrix_scenarios.py
          tests\agent_router_scenarios.py
          tests\evidence_service_scenarios.py
          tests\job_view_service_scenarios.py
          tests\rag_service_scenarios.py
          tests\agent_runtime_scenarios.py
          tests\backend_services_scenarios.py
          tests\fastapi_backend_scenarios.py

      - name: Encoding and public readiness checks
        shell: pwsh
        run: |
          python scripts\check_text_encoding.py
          python scripts\public_readiness_check.py

      - name: Smoke test
        shell: pwsh
        run: |
          python tests\smoke_test.py
          python tests\artifact_save_service_scenarios.py
          python tests\crawler_delegation_service_scenarios.py
          python tests\crawler_job_finalization_service_scenarios.py
          python tests\crawler_job_progress_service_scenarios.py
          python tests\crawler_job_setup_service_scenarios.py
          python tests\crawler_loop_control_service_scenarios.py
          python tests\crawler_planner_wait_service_scenarios.py
          python tests\crawler_reflection_decision_scenarios.py
          python tests\crawler_runtime_step_service_scenarios.py
          python tests\crawler_task_materialization_service_scenarios.py
          python tests\crawler_task_preparation_service_scenarios.py
          python tests\crawler_temporary_extract_service_scenarios.py
          python tests\crawler_result_accounting_service_scenarios.py
          python tests\crawler_topic_discovery_service_scenarios.py
          python tests\crawler_reflection_service_scenarios.py
          python tests\agent_execution_scenarios.py
          python tests\agent_executor_scenarios.py
          python tests\agent_five_direction_matrix_scenarios.py
          python tests\agent_router_scenarios.py
          python tests\evidence_service_scenarios.py
          python tests\job_view_service_scenarios.py
          python tests\rag_service_scenarios.py
          python tests\agent_runtime_scenarios.py
          python tests\backend_services_scenarios.py
          python tests\fastapi_backend_scenarios.py

      - name: Frontend syntax check
        shell: pwsh
        run: |
          node --check frontend\static\app.js
          node --check frontend\static\settings.js
