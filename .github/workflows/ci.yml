name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install -r requirements.txt

      - name: Python syntax check
        shell: pwsh
        run: python -m compileall -q mcagent scripts tests api.py chat.py ingest.py web.py

      - name: Encoding and public readiness checks
        shell: pwsh
        run: |
          python scripts\check_text_encoding.py
          python scripts\public_readiness_check.py

      - name: Smoke test
        shell: pwsh
        run: |
          Get-ChildItem tests -Filter *_scenarios.py | Sort-Object Name | ForEach-Object {
            Write-Host "RUN $($_.Name)"
            python $_.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          python tests\smoke_test.py

      - name: Frontend syntax check
        shell: pwsh
        run: |
          node --check frontend\static\app.js
          node --check frontend\static\settings.js
